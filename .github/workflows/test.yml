name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"      # was "npm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile   # was npm ci

      - name: Run tests
        run: pnpm vitest run --reporter=verbose